<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gimnasio Nuevo Estilo Fuengirola — Paco Mula</title>
  <meta name="description" content="Gimnasio Nuevo Estilo en Fuengirola, dirigido por Paco Mula. Más de 25 años de historia. Nueva web próximamente." />
  <link rel="canonical" href="https://gimnasionuevoestilo.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #E8186A;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background-image: url('nuevoestilo.hero.png');
      background-attachment: fixed;
      background-size: cover;
      background-position: center top;
      background-color: #000;
    }

    .overlay {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(0,0,0,0.62);
      padding: 2rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 6rem);
      letter-spacing: 0.08em;
      color: #fff;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .logo span { color: var(--pink); }

    .sub {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 3rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
      padding: 0.6rem 1.4rem;
      margin-bottom: 2.5rem;
    }

    .contact {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }

    .contact a {
      color: var(--pink);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="logo">Nuevo<span>&nbsp;Estilo</span></div>
    <div class="sub">Gimnasio · Fuengirola</div>
    <div class="badge">Web en progreso</div>
    <div class="contact">
      📞 <a href="tel:+34952470044">952 470 044</a>
      &nbsp;·&nbsp;
      📍 Fuengirola, Málaga
    </div>
  </div>
</body>
</html>
